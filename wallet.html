<!DOCTYPE html>
<html>
<head>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Wallet</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:linear-gradient(45deg,#2563eb,#00c6ff);
min-height:100vh;
padding-bottom:20px;
}

/* HEADER */

.header{
color:white;
text-align:center;
font-size:22px;
padding:18px;
font-weight:900;
}

/* CARD */

.card{
background:#fff;
margin:15px;
padding:15px;
border-radius:25px;
box-shadow:0 8px 20px rgba(0,0,0,0.12);
}

/* BALANCE */

.balance{
text-align:center;
font-size:30px;
font-weight:900;
margin-bottom:15px;
}

/* SWITCH */

.switch{
display:flex;
justify-content:center;
gap:12px;
margin-bottom:15px;
flex-wrap:wrap;
}

.switch button{
padding:10px 24px;
border:none;
border-radius:30px;
font-weight:900;
font-size:15px;
cursor:pointer;
transition:.3s;
}

.activeBtn{
background:linear-gradient(45deg,#7b00ff,#c000ff);
color:white;
}

.inactiveBtn{
background:#ddd;
color:#222;
}

/* INPUT */

.inputBox{
width:100%;
margin:auto;
}

input,select{
width:100%;
padding:12px;
margin:6px 0;
border-radius:12px;
border:1px solid #ccc;
font-size:14px;
outline:none;
}

input:focus,
select:focus{
border:1px solid #7b00ff;
}

/* BUTTON */

.btn{
width:100%;
padding:12px;
border:none;
border-radius:25px;
background:linear-gradient(45deg,#7b00ff,#00c6ff);
color:white;
font-size:15px;
font-weight:900;
cursor:pointer;
margin-top:8px;
}

h3{
margin:10px 0;
font-size:18px;
}

/* CHARGE */

#chargeText{
font-size:13px;
font-weight:700;
color:green;
text-align:center;
margin-top:5px;
}

/* MEMBER NAME */

#name{
color:#00a651;
font-size:15px;
font-weight:900;
margin:6px 0 2px 4px;
}

/* TABLE */

.tableBox{
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
font-size:11px;
}

th,td{
padding:7px;
text-align:center;
border-bottom:1px solid #ddd;
}

th{
background:#555;
color:white;
font-size:11px;
}

.credit{
color:green;
font-weight:bold;
}

.debit{
color:red;
font-weight:bold;
}

/* WITHDRAW */

.withdrawCard{
width:75%;
margin:12px auto;
background:linear-gradient(135deg,#7b00ff,#00c6ff);
padding:18px;
border-radius:28px;
color:white;
box-shadow:0 10px 25px rgba(123,0,255,0.30);
}

.withdrawTitle{
text-align:center;
font-size:22px;
font-weight:900;
margin-bottom:15px;
}

.withdrawInfo{
background:white;
padding:18px;
border-radius:22px;
color:#222;
}

.withdrawInfo p{
font-size:13px;
font-weight:800;
margin:8px 0;
}

.preview{
margin-top:10px;
font-size:15px;
font-weight:900;
color:#00a651;
text-align:center;
}

@media(max-width:500px){

.withdrawCard{
width:92%;
}

.balance{
font-size:24px;
}

}

</style>

</head>

<body>

<div class="header">
💰 My Wallet
</div>

<div class="card">

<div class="balance">
Balance: ₹<span id="bal">0</span>
</div>

<!-- SWITCH -->

<div class="switch">

<button id="walletBtn"
class="activeBtn"
onclick="showWallet()">
Wallet
</button>

<button id="withdrawBtn"
class="inactiveBtn"
onclick="showWithdraw()">
Withdrawal
</button>

<button id="historyBtn"
class="inactiveBtn"
onclick="showHistory()">
History
</button>

</div>

<!-- WALLET -->

<div id="walletSection">

<h3>Add Money (Admin Approval)</h3>

<div class="inputBox">

<input id="amount"
type="number"
placeholder="Enter amount">

<select id="method">

<option value="">
Select Payment Method
</option>

<option>UPI</option>
<option>PhonePe</option>
<option>Google Pay</option>
<option>Bank Transfer</option>

</select>

<input id="utr"
type="text"
maxlength="14"
placeholder="Enter UTR (14 digit)">

</div>

<button class="btn"
onclick="addMoney()">
Submit Request
</button>

<hr style="margin:15px 0">

<!-- TRANSFER -->

<h3>Transfer Money</h3>

<div class="inputBox">

<input id="mobile"
maxlength="10"
placeholder="Receiver Mobile">

<div id="name"></div>

<input id="sendAmount"
type="number"
placeholder="Amount">

</div>

<div id="chargeText"></div>

<button class="btn"
onclick="sendMoney()">
Send Money
</button>

</div>

<!-- WITHDRAW -->

<div id="withdrawSection"
style="display:none">

<div class="withdrawCard">

<div class="withdrawTitle">
💸 Withdrawal
</div>

<div class="withdrawInfo">

<p>Minimum Withdrawal ₹100</p>

<p>TDS Charge 5%</p>

<p>Platform Charge 5%</p>

<p>Payment Only KYC Bank Account</p>

<p>Processing Time 0-24 Hours</p>

<input id="withdrawAmount"
type="number"
placeholder="Enter Withdrawal Amount">

<input id="accName"
readonly
placeholder="Account Holder Name">

<input id="accountNumber"
readonly
placeholder="Account Number">

<input id="ifsc"
readonly
placeholder="IFSC Code">

<div class="preview"
id="withdrawPreview">
</div>

<button class="btn"
onclick="withdrawMoney()">
Withdraw Now
</button>

</div>

</div>

</div>

<!-- HISTORY -->

<div id="historySection"
style="display:none">

<h3>
📜 Passbook
</h3>

<div class="tableBox">

<table>

<thead>

<tr>

<th>Date</th>
<th>Particular</th>
<th>Withdraw</th>
<th>Deposit</th>
<th>Balance</th>

</tr>

</thead>

<tbody id="historyData"></tbody>

</table>

</div>

</div>

</div>

<script>

/* =========================================
CURRENT USER
========================================= */

let currentUser =
JSON.parse(
localStorage.getItem(
"currentUser"
)
) || {};

/* =========================================
USER KEY
========================================= */

let userKey =
"user_" +
currentUser.mobile;

/* =========================================
USER DATA
========================================= */

let user =
JSON.parse(
localStorage.getItem(
userKey
)
) || {};

/* =========================================
FIX USER DATA
========================================= */

if(!user.wallet){
user.wallet = 0;
}

if(!user.history){
user.history = [];
}

/* =========================================
MAIN WALLET
========================================= */

let balance =
parseInt(

localStorage.getItem(
"wallet_" +
currentUser.userId
)

) || 0;

/* =========================================
SYNC OLD SYSTEM
========================================= */

user.wallet =
balance;

/* =========================================
HISTORY
========================================= */

let history =
user.history;

/* =========================================
SHOW BALANCE
========================================= */

document.getElementById(
"bal"
).innerText =
balance;

/* =========================================
AUTO KYC DATA
========================================= */

accName.value =
user.accName || "";

accountNumber.value =
user.accNumber || "";

ifsc.value =
user.ifsc || "";

/* =========================================
SAVE USER
========================================= */

function saveUser(){

user.wallet =
balance;

/* OLD SYSTEM SAVE */

localStorage.setItem(
userKey,
JSON.stringify(user)
);

/* MAIN WALLET SAVE */

localStorage.setItem(

"wallet_" +
currentUser.userId,

balance

);

}

/* =========================================
SWITCH
========================================= */

function showWallet(){

walletSection.style.display =
"block";

withdrawSection.style.display =
"none";

historySection.style.display =
"none";

walletBtn.className =
"activeBtn";

withdrawBtn.className =
"inactiveBtn";

historyBtn.className =
"inactiveBtn";

}

function showWithdraw(){

walletSection.style.display =
"none";

withdrawSection.style.display =
"block";

historySection.style.display =
"none";

walletBtn.className =
"inactiveBtn";

withdrawBtn.className =
"activeBtn";

historyBtn.className =
"inactiveBtn";

}

function showHistory(){

walletSection.style.display =
"none";

withdrawSection.style.display =
"none";

historySection.style.display =
"block";

walletBtn.className =
"inactiveBtn";

withdrawBtn.className =
"inactiveBtn";

historyBtn.className =
"activeBtn";

loadHistory();

}

/* =========================================
ADD MONEY
========================================= */

function addMoney(){

let amt =
Number(amount.value);

let utrVal =
utr.value;

let methodVal =
method.value;

if(
amt<=0 ||
utrVal.length!=14 ||
methodVal==""
){

alert("Fill all details properly");

return;

}

let req =
JSON.parse(
localStorage.getItem("requests")
)
|| [];

req.push({

mobile:user.mobile,

amount:amt,

utr:utrVal,

method:methodVal,

status:"Pending",

time:Date.now()

});

localStorage.setItem(
"requests",
JSON.stringify(req)
);

alert("Request Sent To Admin");

amount.value="";
utr.value="";
method.value="";

}

/* =========================================
MEMBER NAME
========================================= */

document.getElementById(
"mobile"
).addEventListener(
"input",
function(){

let m =
this.value.trim();

if(m.length===10){

let data =
localStorage.getItem(
"user_"+m
);

if(data){

let u =
JSON.parse(data);

document.getElementById(
"name"
).innerText =
"Member Name : " + u.name;

}else{

document.getElementById(
"name"
).innerText =
"User Not Found";

}

}else{

document.getElementById(
"name"
).innerText = "";

}

});

/* =========================================
CHARGE
========================================= */

sendAmount.oninput=function(){

let amt =
Number(sendAmount.value);

let charge =
Math.ceil(amt/100)*2;

if(amt>0){

chargeText.innerText =
"Charge ₹"+charge+
" | Total ₹"+(amt+charge);

}else{

chargeText.innerText="";

}

}

/* =========================================
SEND MONEY
========================================= */

function sendMoney(){

let m =
mobile.value.trim();

let amt =
Number(sendAmount.value);

let receiver =
JSON.parse(
localStorage.getItem(
"user_"+m
));

if(!receiver){

alert("User Not Found");

return;

}

if(amt<=0){

alert("Enter Valid Amount");

return;

}

let charge =
Math.ceil(amt/100)*2;

let total =
amt + charge;

if(total > balance){

alert("Insufficient Balance");

return;

}

/* BALANCE */

balance -= total;

user.wallet = balance;

/* RECEIVER */

receiver.wallet =
(receiver.wallet || 0) + amt;

/* MAIN WALLET UPDATE */

localStorage.setItem(

"wallet_" +
receiver.userId,

receiver.wallet

);

let date =
new Date().toLocaleString();

/* SENDER HISTORY */

history.unshift({

date:date,

type:"Debit",

amt:total,

msg:
"Money Transfer To " +
receiver.name,

bal:balance

});

/* RECEIVER HISTORY */

receiver.history =
receiver.history || [];

receiver.history.unshift({

date:date,

type:"Credit",

amt:amt,

msg:
"Received Money From " +
user.name,

bal:receiver.wallet

});

/* SAVE */

saveUser();

localStorage.setItem(
"user_"+m,
JSON.stringify(receiver)
);

bal.innerText =
balance;

alert(
"Money Sent Successfully"
);

/* RESET */

mobile.value="";

sendAmount.value="";

document.getElementById(
"name"
).innerText="";

chargeText.innerText="";

}

/* =========================================
WITHDRAW PREVIEW
========================================= */

withdrawAmount.oninput=function(){

let amt =
Number(this.value);

if(amt>0){

let tds =
amt * 0.05;

let charge =
amt * 0.05;

let final =
amt - tds - charge;

withdrawPreview.innerHTML =

"Final Receive Amount ₹"+
final.toFixed(2);

}else{

withdrawPreview.innerHTML="";

}

}

/* =========================================
WITHDRAW
========================================= */

function withdrawMoney(){

let amt =
Number(
withdrawAmount.value
);

if(amt < 100){

alert(
"Minimum Withdrawal ₹100"
);

return;

}

if(amt > balance){

alert("Insufficient Balance");

return;

}

if(!user.accNumber){

alert("Complete KYC First");

return;

}

let tds =
amt * 0.05;

let charge =
amt * 0.05;

let final =
amt - tds - charge;

balance -= amt;

user.wallet = balance;

let date =
new Date().toLocaleString();

/* HISTORY */

history.unshift({

date:date,

type:"Debit",

amt:amt,

msg:
"Withdrawal | TDS ₹"+
tds.toFixed(0)+
" | Charge ₹"+
charge.toFixed(0)+
" | Receive ₹"+
final.toFixed(0),

bal:balance

});

/* REQUEST */

let withdrawReq =
JSON.parse(
localStorage.getItem(
"withdrawRequests"
)) || [];

withdrawReq.push({

mobile:user.mobile,

name:user.name,

amount:amt,

tds:tds,

charge:charge,

final:final,

account:user.accNumber,

ifsc:user.ifsc,

status:"Pending",

date:date

});

localStorage.setItem(
"withdrawRequests",
JSON.stringify(withdrawReq)
);

saveUser();

bal.innerText =
balance;

alert(
"Withdrawal Request Sent"
);

withdrawAmount.value="";

withdrawPreview.innerHTML="";

}

/* =========================================
HISTORY
========================================= */

function loadHistory(){

let box =
document.getElementById(
"historyData"
);

box.innerHTML="";

history = user.history || [];

history.forEach(x=>{

box.innerHTML += `

<tr>

<td>${x.date}</td>

<td>${x.msg}</td>

<td class="${
x.type=="Debit"
?
"debit"
:
""
}">

${
x.type=="Debit"
?
"₹"+x.amt
:
"-"
}

</td>

<td class="${
x.type=="Credit"
?
"credit"
:
""
}">

${
x.type=="Credit"
?
"₹"+x.amt
:
"-"
}

</td>

<td>
₹${x.bal}
</td>

</tr>

`;

});

}

/* =========================================
AUTO UPDATE
========================================= */

setInterval(()=>{

balance =
parseInt(

localStorage.getItem(
"wallet_" +
currentUser.userId
)

) || 0;

bal.innerText =
balance;

},1000);

</script>

</body>
</html>
