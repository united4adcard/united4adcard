<!DOCTYPE html>
<html>
<head>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Wallet</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:linear-gradient(45deg,#2563eb,#00c6ff);
min-height:100vh;
padding-bottom:20px;
}

/* HEADER */

.header{
color:white;
text-align:center;
font-size:22px;
padding:18px;
font-weight:900;
}

/* CARD */

.card{
background:#fff;
margin:15px;
padding:15px;
border-radius:25px;
box-shadow:0 8px 20px rgba(0,0,0,0.12);
}

/* BALANCE */

.balance{
text-align:center;
font-size:30px;
font-weight:900;
margin-bottom:15px;
}

/* SWITCH */

.switch{
display:flex;
justify-content:center;
gap:12px;
margin-bottom:15px;
flex-wrap:wrap;
}

.switch button{
padding:10px 24px;
border:none;
border-radius:30px;
font-weight:900;
font-size:15px;
cursor:pointer;
transition:.3s;
}

.activeBtn{
background:linear-gradient(45deg,#7b00ff,#c000ff);
color:white;
}

.inactiveBtn{
background:#ddd;
color:#222;
}

/* INPUT */

.inputBox{
width:100%;
margin:auto;
}

input,select{
width:100%;
padding:12px;
margin:6px 0;
border-radius:12px;
border:1px solid #ccc;
font-size:14px;
outline:none;
}

input:focus,
select:focus{
border:1px solid #7b00ff;
}

/* BUTTON */

.btn{
width:100%;
padding:12px;
border:none;
border-radius:25px;
background:linear-gradient(45deg,#7b00ff,#00c6ff);
color:white;
font-size:15px;
font-weight:900;
cursor:pointer;
margin-top:8px;
}

h3{
margin:10px 0;
font-size:18px;
}

/* TABLE */

.tableBox{
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
font-size:11px;
}

th,td{
padding:7px;
text-align:center;
border-bottom:1px solid #ddd;
}

th{
background:#555;
color:white;
font-size:11px;
}

.credit{
color:green;
font-weight:bold;
}

.debit{
color:red;
font-weight:bold;
}

</style>

</head>

<body>

<div class="header">
💰 My Wallet
</div>

<div class="card">

<div class="balance">
Balance: ₹<span id="bal">0</span>
</div>

<!-- SWITCH -->

<div class="switch">

<button id="walletBtn"
class="activeBtn"
onclick="showWallet()">
Wallet
</button>

<button id="historyBtn"
class="inactiveBtn"
onclick="showHistory()">
History
</button>

</div>

<!-- WALLET -->

<div id="walletSection">

<h3>Add Money (Admin Approval)</h3>

<div class="inputBox">

<input id="amount"
type="number"
placeholder="Enter amount">

<select id="method">

<option value="">
Select Payment Method
</option>

<option>UPI</option>
<option>PhonePe</option>
<option>Google Pay</option>
<option>Bank Transfer</option>

</select>

<input id="utr"
type="text"
maxlength="14"
placeholder="Enter UTR (14 digit)">

</div>

<button class="btn"
onclick="addMoney()">
Submit Request
</button>

</div>

<!-- HISTORY -->

<div id="historySection"
style="display:none">

<h3>
📜 Passbook
</h3>

<div class="tableBox">

<table>

<thead>

<tr>

<th>Date</th>
<th>Particular</th>
<th>Withdraw</th>
<th>Deposit</th>
<th>Balance</th>

</tr>

</thead>

<tbody id="historyData"></tbody>

</table>

</div>

</div>

</div>

<script>

/* USER */

let currentUser =
localStorage.getItem(
"currentUser"
);

let userKey =
"user_" + currentUser;

let user =
JSON.parse(
localStorage.getItem(userKey)
) || {};

/* DEFAULT */

if(!user.wallet){
user.wallet = 0;
}

if(!user.history){
user.history = [];
}

/* SCRATCH WALLET */

let scratchWallet =
parseFloat(
localStorage.getItem(
"wallet_" + currentUser
)
) || 0;

/* SYNC */

if(scratchWallet > 0){

user.wallet = scratchWallet;

}

/* DATA */

let balance =
user.wallet;

let history =
user.history;

/* BALANCE */

document.getElementById(
"bal"
).innerText =
balance;

/* SAVE */

function saveUser(){

localStorage.setItem(
userKey,
JSON.stringify(user)
);

/* SYNC */

localStorage.setItem(
"wallet_" + currentUser,
user.wallet
);

localStorage.setItem(
"mainWallet",
user.wallet
);

}

/* SWITCH */

function showWallet(){

walletSection.style.display =
"block";

historySection.style.display =
"none";

walletBtn.className =
"activeBtn";

historyBtn.className =
"inactiveBtn";

}

function showHistory(){

walletSection.style.display =
"none";

historySection.style.display =
"block";

walletBtn.className =
"inactiveBtn";

historyBtn.className =
"activeBtn";

loadHistory();

}

/* ADD MONEY */

function addMoney(){

let amt =
Number(amount.value);

let utrVal =
utr.value;

let methodVal =
method.value;

if(
amt<=0 ||
utrVal.length!=14 ||
methodVal==""
){

alert("Fill all details properly");

return;

}

let req =
JSON.parse(
localStorage.getItem("requests")
)
|| [];

req.push({

mobile:user.mobile,

amount:amt,

utr:utrVal,

method:methodVal,

status:"Pending",

time:Date.now()

});

localStorage.setItem(
"requests",
JSON.stringify(req)
);

alert("Request Sent To Admin");

amount.value="";
utr.value="";
method.value="";

}

/* HISTORY */

function loadHistory(){

let box =
document.getElementById(
"historyData"
);

box.innerHTML="";

history = user.history || [];

history.forEach(x=>{

box.innerHTML += `

<tr>

<td>${x.date}</td>

<td>${x.msg}</td>

<td class="${
x.type=="Debit"
?
"debit"
:
""
}">

${
x.type=="Debit"
?
"₹"+x.amt
:
"-"
}

</td>

<td class="${
x.type=="Credit"
?
"credit"
:
""
}">

${
x.type=="Credit"
?
"₹"+x.amt
:
"-"
}

</td>

<td>
₹${x.bal}
</td>

</tr>

`;

});

}

/* AUTO UPDATE */

setInterval(()=>{

let latestWallet =

parseFloat(

localStorage.getItem(
"wallet_" + currentUser
)

) || 0;

user.wallet = latestWallet;

balance = latestWallet;

bal.innerText = balance;

},1000);

</script>

</body>
  </html>
