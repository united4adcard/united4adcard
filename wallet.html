<!DOCTYPE html>
<html>
<head>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Wallet</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:linear-gradient(45deg,#2563eb,#00c6ff);
min-height:100vh;
padding-bottom:20px;
}

/* HEADER */

.header{
color:white;
text-align:center;
font-size:22px;
padding:18px;
font-weight:900;
}

/* CARD */

.card{
background:#fff;
margin:15px;
padding:15px;
border-radius:25px;
box-shadow:0 8px 20px rgba(0,0,0,0.12);
}

/* BALANCE */

.balance{
text-align:center;
font-size:30px;
font-weight:900;
margin-bottom:15px;
}

/* SWITCH */

.switch{
display:flex;
justify-content:center;
gap:12px;
margin-bottom:15px;
flex-wrap:wrap;
}

.switch button{
padding:10px 24px;
border:none;
border-radius:30px;
font-weight:900;
font-size:15px;
cursor:pointer;
transition:.3s;
}

.activeBtn{
background:linear-gradient(45deg,#7b00ff,#c000ff);
color:white;
}

.inactiveBtn{
background:#ddd;
color:#222;
}

/* INPUT */

.inputBox{
width:100%;
margin:auto;
}

input,select{
width:100%;
padding:12px;
margin:6px 0;
border-radius:12px;
border:1px solid #ccc;
font-size:14px;
outline:none;
}

input:focus,
select:focus{
border:1px solid #7b00ff;
}

/* BUTTON */

.btn{
width:100%;
padding:12px;
border:none;
border-radius:25px;
background:linear-gradient(45deg,#7b00ff,#00c6ff);
color:white;
font-size:15px;
font-weight:900;
cursor:pointer;
margin-top:8px;
}

h3{
margin:10px 0;
font-size:18px;
}

/* TABLE */

.tableBox{
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
font-size:11px;
}

th,td{
padding:7px;
text-align:center;
border-bottom:1px solid #ddd;
}

th{
background:#555;
color:white;
font-size:11px;
}

.credit{
color:green;
font-weight:bold;
}

.debit{
color:red;
font-weight:bold;
}

</style>

</head>

<body>

<div class="header">
💰 My Wallet
</div>

<div class="card">

<div class="balance">
Balance: ₹<span id="bal">0</span>
</div>

<!-- SWITCH -->

<div class="switch">

<button id="walletBtn"
class="activeBtn"
onclick="showWallet()">
Wallet
</button>

<button id="historyBtn"
class="inactiveBtn"
onclick="showHistory()">
History
</button>

</div>

<!-- WALLET -->

<div id="walletSection">

<h3>Add Money (Admin Approval)</h3>

<div class="inputBox">

<input id="amount"
type="number"
placeholder="Enter amount">

<select id="method">

<option value="">
Select Payment Method
</option>

<option>UPI</option>
<option>PhonePe</option>
<option>Google Pay</option>
<option>Bank Transfer</option>

</select>

<input id="utr"
type="text"
maxlength="14"
placeholder="Enter UTR (14 digit)">

</div>

<button class="btn"
onclick="addMoney()">
Submit Request
</button>

</div>

<!-- HISTORY -->

<div id="historySection"
style="display:none">

<h3>
📜 Passbook
</h3>

<div class="tableBox">

<table>

<thead>

<tr>

<th>Date</th>
<th>Particular</th>
<th>Withdraw</th>
<th>Deposit</th>
<th>Balance</th>

</tr>

</thead>

<tbody id="historyData"></tbody>

</table>

</div>

</div>

</div>

<script>

/* =========================================
FINAL WALLET SYSTEM
SCRATCH + MAIN WALLET CONNECT
HISTORY CONNECTED
ALL OLD SETTINGS SAFE
NOTHING DELETE
========================================= */

/* USER */

let currentUser =
JSON.parse(
localStorage.getItem(
"currentUser"
)
) || {};

/* USER KEY */

let userKey =
currentUser.userId || "guest";

/* USER DATA */

let user =
JSON.parse(
localStorage.getItem(
"user_" + userKey
)
) || {};

/* DEFAULT */

if(!user.wallet){
user.wallet = 0;
}

/* BALANCE */

let balance =
parseFloat(
localStorage.getItem(
"wallet_" + userKey
)
) || 0;

/* HISTORY */

let history =
JSON.parse(
localStorage.getItem(
"walletHistory_" + userKey
)
) || [];

/* SHOW BALANCE */

document.getElementById(
"bal"
).innerText =
balance;

/* SAVE USER */

function saveUser(){

user.wallet = balance;

localStorage.setItem(

"user_" + userKey,

JSON.stringify(user)

);

/* MAIN WALLET */

localStorage.setItem(

"wallet_" + userKey,

balance

);

/* HISTORY */

localStorage.setItem(

"walletHistory_" + userKey,

JSON.stringify(history)

);

/* EXTRA */

localStorage.setItem(
"mainWallet",
balance
);

}

/* SWITCH */

function showWallet(){

walletSection.style.display =
"block";

historySection.style.display =
"none";

walletBtn.className =
"activeBtn";

historyBtn.className =
"inactiveBtn";

}

/* HISTORY OPEN */

function showHistory(){

walletSection.style.display =
"none";

historySection.style.display =
"block";

walletBtn.className =
"inactiveBtn";

historyBtn.className =
"activeBtn";

loadHistory();

}

/* ADD MONEY */

function addMoney(){

let amt =
Number(amount.value);

let utrVal =
utr.value;

let methodVal =
method.value;

if(
amt <= 0 ||
utrVal.length != 14 ||
methodVal == ""
){

alert(
"Fill all details properly"
);

return;

}

/* REQUEST */

let req =
JSON.parse(
localStorage.getItem(
"requests"
)
) || [];

req.push({

mobile:
currentUser.mobile || "",

amount:amt,

utr:utrVal,

method:methodVal,

status:"Pending",

time:Date.now()

});

localStorage.setItem(

"requests",

JSON.stringify(req)

);

/* HISTORY */

history.unshift({

date:new Date().toLocaleString(),

msg:"Add Money Request",

amount:amt,

type:"Credit",

balance:balance

});

saveUser();

/* SUCCESS */

alert(
"Request Sent To Admin"
);

/* CLEAR */

amount.value="";
utr.value="";
method.value="";

}

/* LOAD HISTORY */

function loadHistory(){

let box =
document.getElementById(
"historyData"
);

box.innerHTML = "";

/* GET LATEST */

history =
JSON.parse(
localStorage.getItem(
"walletHistory_" + userKey
)
) || [];

if(history.length == 0){

box.innerHTML = `

<tr>

<td colspan="5">
No History Found
</td>

</tr>

`;

return;

}

/* LOOP */

history.forEach(x=>{

box.innerHTML += `

<tr>

<td>
${x.date}
</td>

<td>
${x.msg}
</td>

<td class="${
x.type=="Debit"
?
"debit"
:
""
}">

${
x.type=="Debit"
?
"₹"+x.amount
:
"-"
}

</td>

<td class="${
x.type=="Credit"
?
"credit"
:
""
}">

${
x.type=="Credit"
?
"₹"+x.amount
:
"-"
}

</td>

<td>
₹${x.balance}
</td>

</tr>

`;

});

}

/* AUTO UPDATE */

setInterval(()=>{

let latestWallet =

parseFloat(

localStorage.getItem(
"wallet_" + userKey
)

) || 0;

/* UPDATE */

balance = latestWallet;

/* SHOW */

document.getElementById(
"bal"
).innerText =
balance;

},1000);

/* START */

loadHistory();

</script>

</body>
  </html>
