FINAL QR WALLET SYSTEM
NO EXTRA HISTORY
ONLY WALLET CONNECT
RECEIVE QR
SEND QR SCANNER
COMPACT DESIGN
ALL SAFE
========================================= -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>
United4adcard Wallet Transfer
</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{

background:
linear-gradient(
180deg,
#031525,
#071827,
#0b1120
);

color:white;
padding-bottom:85px;
}

a{
text-decoration:none;
}

/* HEADER */

.header{
padding:10px 12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
width:42px;
height:42px;
border-radius:12px;
overflow:hidden;
}

.logo img{
width:100%;
height:100%;
object-fit:cover;
}

.bell{
width:36px;
height:36px;
border-radius:12px;
display:flex;
justify-content:center;
align-items:center;
background:rgba(255,255,255,.05);
font-size:14px;
}

/* WALLET */

.wallet{

margin:0 12px;

padding:12px;

border-radius:18px;

background:
linear-gradient(
135deg,
#082f49,
#0f172a
);
}

.wallet h3{
font-size:9px;
color:#94a3b8;
}

.wallet h1{
font-size:24px;
margin-top:3px;
color:#22d3ee;
}

.wallet p{
font-size:9px;
margin-top:4px;
color:#cbd5e1;
}

/* QR */

.qr-box{

margin:10px 12px;

padding:12px;

border-radius:18px;

background:
rgba(255,255,255,.05);

text-align:center;
}

.qr-box h2{
font-size:13px;
margin-bottom:8px;
}

.qr-area{

width:150px;
height:150px;

margin:auto;

border-radius:16px;

overflow:hidden;

background:white;

border:3px solid #14b8a6;
}

.qr-area img{
width:100%;
height:100%;
}

.qr-note{
margin-top:6px;
font-size:8px;
color:#94a3b8;
}

/* SWITCH */

.switch{

margin:10px 12px;

display:grid;

grid-template-columns:1fr 1fr;

gap:8px;
}

.switch button{

height:40px;

border:none;
border-radius:12px;

font-size:12px;
font-weight:700;

color:white;
}

.activeBtn{
background:
linear-gradient(
135deg,
#0ea5e9,
#14b8a6
);
}

.inactiveBtn{
background:
rgba(255,255,255,.05);
}

/* BOX */

.box{

margin:0 12px;

padding:12px;

border-radius:18px;

background:
rgba(255,255,255,.05);
}

.label{
font-size:9px;
margin-bottom:5px;
display:block;
}

.input{

width:100%;
height:40px;

margin-bottom:10px;

border:none;
outline:none;

border-radius:12px;

padding:0 12px;

background:
rgba(255,255,255,.05);

color:white;

font-size:11px;
}

.btn{

width:100%;
height:40px;

border:none;
border-radius:12px;

font-size:12px;
font-weight:700;

background:
linear-gradient(
135deg,
#0ea5e9,
#14b8a6
);

color:white;
}

/* SCAN */

.scan-btn{

width:100%;
height:55px;

margin-bottom:10px;

border-radius:14px;

border:1px dashed #22d3ee;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

background:
rgba(255,255,255,.04);

color:#22d3ee;
}

.scan-btn i{
font-size:20px;
margin-bottom:3px;
}

.scan-btn p{
font-size:10px;
font-weight:700;
}

/* BOTTOM */

.bottom{

position:fixed;

left:10px;
right:10px;
bottom:10px;

height:60px;

border-radius:18px;

background:
rgba(15,23,42,.95);

display:flex;
justify-content:space-around;
align-items:center;
}

.nav{
text-align:center;
font-size:8px;
color:#94a3b8;
}

.nav i{
display:block;
font-size:16px;
margin-bottom:2px;
}

.active{
color:#22d3ee;
}

/* POPUP */

.popup{

position:fixed;
inset:0;

background:
rgba(0,0,0,.85);

display:none;
justify-content:center;
align-items:center;

z-index:99999;
}

.popup-box{

width:90%;
max-width:260px;

padding:14px;

border-radius:18px;

background:#0f172a;

text-align:center;
}

#reader{
width:100%;
overflow:hidden;
border-radius:12px;
}

.close-btn{

width:100%;
height:38px;

margin-top:12px;

border:none;
border-radius:12px;

background:
linear-gradient(
135deg,
#ef4444,
#dc2626
);

color:white;
font-weight:700;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

<div class="logo">
<img src="image.png">
</div>

<div class="bell">
<i class="fa-solid fa-wallet"></i>
</div>

</div>

<!-- WALLET -->

<div class="wallet">

<h3>
Available Balance
</h3>

<h1 id="walletBalance">
₹0
</h1>

<p id="userIdText">
User ID
</p>

</div>

<!-- RECEIVE QR -->

<div class="qr-box">

<h2>
My Payment QR
</h2>

<div class="qr-area">

<img id="mainQR">

</div>

<div class="qr-note">
Customer Is QR Ko Scan Karega
</div>

</div>

<!-- SWITCH -->

<div class="switch">

<button id="receiveBtn"
class="activeBtn"
onclick="showReceive()">
Receive
</button>

<button id="sendBtn"
class="inactiveBtn"
onclick="showSend()">
Send
</button>

</div>

<!-- RECEIVE -->

<div id="receiveSection"
class="box">

<label class="label">
Receive Amount
</label>

<input type="number"
id="receiveAmount"
class="input"
placeholder="Enter amount">

<button class="btn"
onclick="receiveMoney()">
ADD MONEY
</button>

</div>

<!-- SEND -->

<div id="sendSection"
class="box"
style="display:none">

<div class="scan-btn"
onclick="openScanner()">

<i class="fa-solid fa-qrcode"></i>

<p>
SCAN RECEIVER QR
</p>

</div>

<label class="label">
Receiver User ID
</label>

<input type="text"
id="sendUser"
class="input"
placeholder="Auto fill after scan">

<label class="label">
Send Amount
</label>

<input type="number"
id="sendAmount"
class="input"
placeholder="Enter amount">

<button class="btn"
onclick="sendMoney()">
SEND MONEY
</button>

</div>

<!-- SCANNER -->

<div class="popup"
id="scannerPopup">

<div class="popup-box">

<div id="reader"></div>

<button class="close-btn"
onclick="closeScanner()">
CLOSE
</button>

</div>

</div>

<!-- BOTTOM -->

<div class="bottom">

<a href="home.html" class="nav active">
<i class="fa-solid fa-house"></i>
Home
</a>

<a href="reward.html" class="nav">
<i class="fa-solid fa-gift"></i>
Reward
</a>

<a href="scratch.html" class="nav">
<i class="fa-solid fa-ticket"></i>
Scratch
</a>

<a href="profile.html" class="nav">
<i class="fa-solid fa-user"></i>
Profile
</a>

</div>

<script>

/* USER */

let currentUser =
JSON.parse(
localStorage.getItem(
"currentUser"
)
) || {};

let userKey =
currentUser.userId || "guest";

/* SHOW */

userIdText.innerHTML =
"User ID : " + userKey;

/* QR */

mainQR.src =

"https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=" +

encodeURIComponent(
"UPI-" + userKey
);

/* WALLET */

function getWallet(){

return parseFloat(

localStorage.getItem(
"wallet_" + userKey
)

) || 0;

}

function updateWallet(){

walletBalance.innerHTML =
"₹" + getWallet();

}

/* SWITCH */

function showReceive(){

receiveSection.style.display =
"block";

sendSection.style.display =
"none";

receiveBtn.className =
"activeBtn";

sendBtn.className =
"inactiveBtn";

}

function showSend(){

receiveSection.style.display =
"none";

sendSection.style.display =
"block";

receiveBtn.className =
"inactiveBtn";

sendBtn.className =
"activeBtn";

}

/* RECEIVE */

function receiveMoney(){

let amount =

parseFloat(
receiveAmount.value
);

if(!amount || amount<=0){

alert(
"Enter Amount"
);

return;

}

let wallet =
getWallet();

wallet += amount;

localStorage.setItem(
"wallet_" + userKey,
wallet
);

updateWallet();

receiveAmount.value="";

alert(
"Money Added Successfully"
);

}

/* SEND */

function sendMoney(){

let receiver =
sendUser.value.trim();

let amount =

parseFloat(
sendAmount.value
);

if(receiver==""){

alert(
"Scan Receiver QR"
);

return;

}

if(!amount || amount<=0){

alert(
"Enter Amount"
);

return;

}

let senderWallet =
getWallet();

if(senderWallet < amount){

alert(
"Insufficient Balance"
);

return;

}

/* SENDER */

senderWallet -= amount;

localStorage.setItem(
"wallet_" + userKey,
senderWallet
);

/* RECEIVER */

let receiverWallet =

parseFloat(

localStorage.getItem(
"wallet_" + receiver
)

) || 0;

receiverWallet += amount;

localStorage.setItem(
"wallet_" + receiver,
receiverWallet
);

/* RECEIVER HISTORY */

let receiverHistory =
JSON.parse(
localStorage.getItem(
"walletHistory_" + receiver
)
) || [];

receiverHistory.unshift({

date:new Date().toLocaleString(),
msg:"Receive From " + userKey,
amount,
type:"Credit",
balance:receiverWallet

});

localStorage.setItem(

"walletHistory_" + receiver,

JSON.stringify(receiverHistory)

);

updateWallet();

sendUser.value="";
sendAmount.value="";

alert(
"Money Sent Successfully"
);

}

/* QR SCANNER */

let html5QrCode;

function openScanner(){

scannerPopup.style.display =
"flex";

html5QrCode =
new Html5Qrcode(
"reader"
);

html5QrCode.start(

{ facingMode:"environment" },

{
fps:10,
qrbox:200
},

(qrCodeMessage)=>{

let userId =

qrCodeMessage
.replace("UPI-","")
.trim();

sendUser.value =
userId;

closeScanner();

alert(
"QR Scanned Successfully"
);

}

);

}

function closeScanner(){

scannerPopup.style.display =
"none";

if(html5QrCode){

html5QrCode.stop();

}

}

/* START */

updateWallet();

setInterval(()=>{

updateWallet();

},1000);

</script>

</body>

</html>
