<script>

/* =========================================
CURRENT USER
========================================= */

let currentUser =
JSON.parse(
localStorage.getItem(
"currentUser"
)
);

/* =========================================
ALL USERS
========================================= */

let users =
JSON.parse(
localStorage.getItem(
"allUsers"
)
) || [];

/* =========================================
ADMIN SETTINGS
========================================= */

let settings =
JSON.parse(
localStorage.getItem(
"incomeSettings"
)
) || {
levels:{}
};

/* =========================================
TABLE
========================================= */

let table =
document.getElementById(
"incomeTable"
);

/* CLEAR */

table.innerHTML = "";

/* =========================================
TOTAL VARIABLES
========================================= */

let totalTeam = 0;

let totalInactive = 0;

let totalActive = 0;

let totalBusiness = 0;

let totalIncome = 0;

/* =========================================
GET NEXT LEVEL USERS
========================================= */

function getNextLevelUsers(parentUsers){

let nextUsers = [];

parentUsers.forEach(parent=>{

let childUsers =
users.filter(user =>

user.referral &&

parent.userId &&

user.referral
.toUpperCase() ===

parent.userId
.toUpperCase()

);

nextUsers.push(...childUsers);

});

return nextUsers;

}

/* =========================================
FIRST LEVEL USERS
========================================= */

let currentLevelUsers = [];

if(currentUser){

currentLevelUsers =
users.filter(user =>

user.referral &&

currentUser.userId &&

user.referral
.toUpperCase() ===

currentUser.userId
.toUpperCase()

);

}

/* =========================================
CREATE 16 LEVEL
========================================= */

for(let level=1; level<=16; level++){

let levelUsers =
currentLevelUsers;

/* TOTAL TEAM */

let total =
levelUsers.length;

/* ACTIVE USERS */

let activeUsers =
levelUsers.filter(user =>

(user.status || "Active")
.toLowerCase() === "active"

);

/* ACTIVE COUNT */

let active =
activeUsers.length;

/* INACTIVE COUNT */

let inactive =
total - active;

/* BUSINESS */

let business = 0;

activeUsers.forEach(user=>{

business += Number(

user.rechargeAmount ||

100

);

});

/* LEVEL AMOUNT */

let levelAmount =
Number(

settings.levels[
"level"+level
] || 0

);

/* DAILY INCOME */

let dailyIncome =
active * levelAmount;

/* TOTAL ADD */

totalTeam += total;

totalInactive += inactive;

totalActive += active;

totalBusiness += business;

totalIncome += dailyIncome;

/* TABLE ROW */

table.innerHTML += `

<tr>

<td>
Level ${level}
</td>

<td class="team">
${total}
</td>

<td class="inactive-status">
${inactive}
</td>

<td class="active-status">
${active}
</td>

<td class="amount">
₹${business}
</td>

<td class="amount">
₹${levelAmount}
</td>

<td class="today">
₹${dailyIncome.toFixed(2)}
</td>

</tr>

`;

/* NEXT LEVEL */

currentLevelUsers =
getNextLevelUsers(
levelUsers
);

}

/* =========================================
TOTAL ROW
========================================= */

table.innerHTML += `

<tr class="total-row">

<td class="total-title">
TOTAL
</td>

<td class="team">
${totalTeam}
</td>

<td class="inactive-status">
${totalInactive}
</td>

<td class="active-status">
${totalActive}
</td>

<td class="amount">
₹${totalBusiness}
</td>

<td class="amount">
--
</td>

<td class="today">
₹${totalIncome.toFixed(2)}
</td>

</tr>

`;

</script>
