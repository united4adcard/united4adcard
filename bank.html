<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>
Bank Account
</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:
linear-gradient(
180deg,
#06131f,
#0b1726
);

color:white;

padding-bottom:100px;
}

/* HEADER */

.header{

padding:14px 16px;

display:flex;
justify-content:space-between;
align-items:center;
}

.logo{

width:44px;
height:44px;

border-radius:12px;

overflow:hidden;
}

.logo img{
width:100%;
height:100%;
object-fit:cover;
}

.noty{

width:36px;
height:36px;

border-radius:10px;

display:flex;
justify-content:center;
align-items:center;

background:
rgba(255,255,255,.06);

font-size:14px;
}

/* TOP */

.top{

margin:0 16px;

padding:14px;

border-radius:18px;

background:
linear-gradient(
135deg,
#0284c7,
#0891b2
);
}

.top h2{
font-size:17px;
}

.top p{
font-size:10px;
margin-top:3px;
opacity:.9;
}

/* FORM */

.box{
padding:16px;
}

.label{
font-size:11px;
margin-bottom:6px;
display:block;
color:#cbd5e1;
}

.input{

width:100%;
height:46px;

border:none;
outline:none;

border-radius:13px;

padding:0 12px;

font-size:12px;

background:
rgba(255,255,255,.06);

border:
1px solid rgba(255,255,255,.05);

color:white;

margin-bottom:10px;
}

/* BUTTON */

.save{

margin-top:12px;

width:100%;
height:48px;

border:none;

border-radius:14px;

font-size:13px;
font-weight:700;

background:
linear-gradient(
135deg,
#0ea5e9,
#14b8a6
);

color:white;
}

/* BANK CARD */

.bank-card{

margin-top:16px;

padding:14px;

border-radius:18px;

background:
linear-gradient(
135deg,
#0284c7,
#0f766e
);

position:relative;

overflow:hidden;
}

.bank-card::after{

content:'';

position:absolute;

right:-30px;
top:-30px;

width:90px;
height:90px;

border-radius:50%;

background:
rgba(255,255,255,.10);
}

.bank-name{
font-size:15px;
font-weight:700;
}

.acc{
margin-top:16px;
font-size:18px;
font-weight:800;
letter-spacing:2px;
}

.holder{
margin-top:8px;
font-size:11px;
opacity:.9;
}

.ifsc{
margin-top:3px;
font-size:10px;
opacity:.8;
}

/* BOTTOM */

.bottom{

position:fixed;

left:10px;
right:10px;
bottom:10px;

height:70px;

border-radius:22px;

background:
rgba(15,23,42,.95);

border:
1px solid rgba(255,255,255,.05);

display:flex;
justify-content:space-around;
align-items:center;
}

.nav{

text-align:center;

font-size:8px;

color:#94a3b8;
text-decoration:none;
}

.nav i{
display:block;
font-size:17px;
margin-bottom:3px;
}

.active{
color:#22d3ee;
}

.qr{

width:58px;
height:58px;

border-radius:50%;

display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(
135deg,
#0284c7,
#0f766e
);

margin-top:-28px;

font-size:22px;

border:4px solid #0f172a;

color:white;
text-decoration:none;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

<div class="logo">
<img src="image.png">
</div>

<div class="noty">
<i class="fa-solid fa-bell"></i>
</div>

</div>

<!-- TOP -->

<div class="top">

<h2>
Bank Account
</h2>

<p>
Add and manage your bank
</p>

</div>

<!-- FORM -->

<div class="box">

<label class="label">
Account Holder Name
</label>

<input type="text"
class="input"
placeholder="Enter holder name">

<label class="label">
Bank Name
</label>

<input type="text"
class="input"
placeholder="Enter bank name">

<label class="label">
Account Number
</label>

<input type="number"
class="input"
placeholder="Enter account number">

<label class="label">
IFSC Code
</label>

<input type="text"
class="input"
placeholder="Enter IFSC code">

<button class="save">
Save Bank Account
</button>

<!-- CARD -->

<div class="bank-card">

<div class="bank-name">
State Bank Of India
</div>

<div class="acc">
XXXX XXXX 4589
</div>

<div class="holder">
Kartik Kumar
</div>

<div class="ifsc">
IFSC : SBIN0004589
</div>

</div>

</div>

<!-- BOTTOM -->

<div class="bottom">

<a href="home.html"
class="nav">

<i class="fa-solid fa-house"></i>
Home

</a>

<a href="reward.html"
class="nav">

<i class="fa-solid fa-gift"></i>
Reward

</a>

<a href="qrpay.html"
class="qr">

<i class="fa-solid fa-qrcode"></i>

</a>

<a href="scratch.html"
class="nav">

<i class="fa-solid fa-ticket"></i>
Scratch

</a>

<a href="profile.html"
class="nav active">

<i class="fa-solid fa-user"></i>
Profile

</a>

</div>

</body>

</html>
