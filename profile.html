<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
-webkit-tap-highlight-color:transparent;
}

a{
text-decoration:none;
}

html,body{
width:100%;
height:100%;
overflow:hidden;

background:
linear-gradient(
180deg,
#031525,
#071827,
#0b1120
);
}

/* APP */

.app{
height:100vh;
overflow-y:auto;
padding-bottom:170px;
}

/* HEADER */

.header{
padding:12px 14px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
width:42px;
height:42px;
border-radius:12px;
overflow:hidden;
border:2px solid rgba(255,255,255,.08);
}

.logo img{
width:100%;
height:100%;
object-fit:cover;
}

.bell{
width:36px;
height:36px;
border-radius:12px;
display:flex;
justify-content:center;
align-items:center;
font-size:15px;
background:rgba(255,255,255,.05);
color:white;
}

/* PROFILE CARD */

.profile-card{

margin:0 14px;

padding:8px;

border-radius:16px;

background:
linear-gradient(
135deg,
#0891b2,
#2563eb
);

position:relative;

overflow:hidden;

text-align:center;

min-height:115px;
}

.profile-card::after{
content:'';
position:absolute;
right:-35px;
top:-35px;
width:80px;
height:80px;
border-radius:50%;
background:rgba(255,255,255,.10);
}

/* PROFILE IMAGE */

.profile-img{

width:44px;
height:44px;

border-radius:50%;

overflow:hidden;

margin:auto;

border:2px solid rgba(255,255,255,.25);

display:block;

cursor:pointer;
}

.profile-img img{
width:100%;
height:100%;
object-fit:cover;
}

#profileUpload{
display:none;
}

/* NAME */

.profile-name{
margin-top:6px;
font-size:13px;
font-weight:800;
color:white;
}

/* MOBILE */

.profile-mobile{
margin-top:2px;
font-size:8px;
color:white;
opacity:.9;
}

/* BALANCE */

.profile-balance{
margin-top:5px;
font-size:16px;
font-weight:800;
color:white;
}

/* SECTION */

.section{
padding:14px 14px 0;
}

.section-title{
font-size:14px;
font-weight:700;
color:white;
margin-bottom:8px;
}

/* MENU */

.menu{

background:
rgba(255,255,255,.05);

border:
1px solid rgba(255,255,255,.05);

border-radius:16px;

overflow:hidden;
}

.menu-item{

display:flex;
justify-content:space-between;
align-items:center;

padding:10px;

border-bottom:
1px solid rgba(255,255,255,.05);

cursor:pointer;

transition:.3s;
}

.menu-item:hover{
background:rgba(255,255,255,.04);
}

.menu-item:last-child{
border-bottom:none;
}

.menu-left{
display:flex;
align-items:center;
gap:10px;
}

.menu-icon{

width:36px;
height:36px;

border-radius:10px;

display:flex;
justify-content:center;
align-items:center;

font-size:14px;

background:
linear-gradient(
135deg,
#0ea5e9,
#14b8a6
);

color:white;
}

.menu-text h4{
font-size:11px;
color:white;
}

.menu-text p{
font-size:7px;
color:#94a3b8;
margin-top:2px;
}

.arrow{
font-size:12px;
color:#94a3b8;
}

/* LOGOUT */

.logout{

margin-top:14px;

height:42px;

border-radius:12px;

display:flex;
justify-content:center;
align-items:center;

font-size:11px;
font-weight:700;

background:
linear-gradient(
135deg,
#dc2626,
#ef4444
);

color:white;

cursor:pointer;
}

/* BOTTOM */

.bottom{

position:fixed;

left:10px;
right:10px;
bottom:10px;

height:72px;

border-radius:24px;

background:
rgba(15,23,42,.96);

border:
1px solid rgba(255,255,255,.05);

display:flex;
justify-content:space-around;
align-items:center;

z-index:999;
}

/* NAV */

.nav{

text-align:center;

font-size:8px;
font-weight:600;

color:#94a3b8;

width:60px;
}

.nav i{

display:block;

font-size:18px;

margin-bottom:3px;
}

.active{
color:#22d3ee;
}

/* QR */

.qr{

width:62px;
height:62px;

border-radius:50%;

background:
linear-gradient(
135deg,
#0284c7,
#0f766e
);

display:flex;
justify-content:center;
align-items:center;

margin-top:-32px;

border:4px solid #0f172a;

font-size:22px;

}

</style>

<script>

/* CURRENT USER */

let currentUser =
JSON.parse(
localStorage.getItem(
"currentUser"
)
);

/* PROFILE ELEMENTS */

let profileName =
document.getElementById(
"profileName"
);

let profileMobile =
document.getElementById(
"profileMobile"
);

let profileBalance =
document.getElementById(
"profileBalance"
);

/* LOAD USER DATA */

if(currentUser){

profileName.innerHTML =
currentUser.name || "User";

profileMobile.innerHTML =
"+91 " +
(
currentUser.mobile || "0000000000"
);

let userId =
currentUser.userId || "";

let wallet =

parseFloat(

localStorage.getItem(
"wallet_" + userId
)

) || 0;

profileBalance.innerHTML =
"₹" + wallet;

/* AUTO UPDATE */

setInterval(()=>{

let latestWallet =

parseFloat(

localStorage.getItem(
"wallet_" + userId
)

) || 0;

profileBalance.innerHTML =
"₹" + latestWallet;

localStorage.setItem(
"userWallet",
latestWallet
);

},1000);

}

/* PROFILE IMAGE */

const upload =
document.getElementById(
'profileUpload'
);

const preview =
document.getElementById(
'profilePreview'
);

upload.onchange = e=>{

const file =
e.target.files[0];

if(file){

const reader =
new FileReader();

reader.onload = function(){

preview.src =
reader.result;

localStorage.setItem(
'profileImage',
reader.result
);

};

reader.readAsDataURL(file);

}

};

/* LOAD SAVED IMAGE */

const savedImage =
localStorage.getItem(
'profileImage'
);

if(savedImage){

preview.src =
savedImage;

}

/* CONNECT */

localStorage.setItem(
"profileConnected",
"true"
);

localStorage.setItem(
"walletConnected",
"true"
);

localStorage.setItem(
"scratchConnected",
"true"
);

/* LOGOUT */

document
.getElementById(
'logoutBtn'
)
.onclick = ()=>{

localStorage.removeItem(
"isLoggedIn"
);

localStorage.removeItem(
"currentUser"
);

window.location.href =
'login.html';

};

console.log(
"PROFILE CONNECTED SUCCESSFULLY"
);

</script>
