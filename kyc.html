<!DOCTYPE html>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{

background:
linear-gradient(
180deg,
#06131f,
#0b1726
);

}

/* HEADER */

.header{

padding:14px 16px;

display:flex;
justify-content:space-between;
align-items:center;
}

.logo{

width:44px;
height:44px;

border-radius:12px;

overflow:hidden;
}

.logo img{
width:100%;
height:100%;
object-fit:cover;
}

.noty{

width:36px;
height:36px;

border-radius:10px;

display:flex;
justify-content:center;
align-items:center;

background:
rgba(255,255,255,.06);

font-size:14px;
}

/* TOP */

.top{

margin:0 16px;

padding:14px;

border-radius:18px;

background:
linear-gradient(
135deg,
#0284c7,
#0891b2
);
}

.top h2{
font-size:17px;
}

.top p{
font-size:10px;
margin-top:3px;
opacity:.9;
}

/* BOX */

.box{
padding:16px;
}

/* STATUS */

.status{

padding:14px;

border-radius:16px;

background:
rgba(255,255,255,.05);

border:
1px solid rgba(255,255,255,.05);

display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:14px;
}

.status h3{
font-size:13px;
}

.badge{

padding:5px 10px;

border-radius:20px;

font-size:10px;
font-weight:700;

background:#3f2b05;
color:#facc15;
}

/* CARD */

.card{

padding:14px;

border-radius:18px;

background:
rgba(255,255,255,.05);

border:
1px solid rgba(255,255,255,.05);

margin-bottom:12px;
}

.card-top{

display:flex;
align-items:center;
gap:10px;
}

.icon{

width:42px;
height:42px;

border-radius:12px;

display:flex;
justify-content:center;
align-items:center;

font-size:16px;

background:
linear-gradient(
135deg,
#06b6d4,
#0f766e
);

color:white;
}

.text h3{
font-size:13px;
}

.text p{
font-size:9px;
color:#94a3b8;
margin-top:3px;
}

.upload{

margin-top:12px;

height:38px;

border-radius:10px;

display:flex;
justify-content:center;
align-items:center;

font-size:11px;
font-weight:700;

background:
linear-gradient(
135deg,
#0ea5e9,
#14b8a6
);

color:white;

cursor:pointer;
}

input[type=file]{
display:none;
}

/* VERIFY BUTTON */

.verify{

margin-top:16px;

width:100%;
height:50px;

border:none;

border-radius:14px;

font-size:14px;
font-weight:700;

background:
linear-gradient(
135deg,
#0284c7,
#14b8a6
);

color:white;

}

/* BOTTOM */

.bottom{

position:fixed;

left:10px;
right:10px;
bottom:10px;

height:70px;

border-radius:22px;

rgba(15,23,42,.95);

1px solid rgba(255,255,255,.05);

display:flex;
justify-content:space-around;

}

.nav{

}

.nav i{
display:block;

margin-bottom:3px;
}

.active{
color:#22d3ee;
}

.qr{

width:58px;
height:58px;

border-radius:50%;

display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(
135deg,
#0284c7,
#0f766e
);

margin-top:-28px;

font-size:22px;

border:4px solid #0f172a;

color:white;
text-decoration:none;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

<div class="logo">
<img src="image.png">
</div>

<div class="noty">
<i class="fa-solid fa-bell"></i>
</div>

</div>

<!-- TOP -->

<div class="top">

<h2>
KYC Verification
</h2>

<p>
Secure your account verification
</p>

</div>

<!-- CONTENT -->

<div class="box">

<!-- STATUS -->

<div class="status">

<h3>
KYC Status
</h3>

<div class="badge"
id="kycBadge">
Pending
</div>

</div>

<!-- AADHAAR -->

<div class="card">

<div class="card-top">

<div class="icon">
<i class="fa-solid fa-id-card"></i>
</div>

<div class="text">

<h3>
Upload Aadhaar Card
</h3>

<p>
Front & back side upload
</p>

</div>

</div>

<label class="upload">

Choose Aadhaar

<input type="file"
id="aadhaarFile">

</label>

</div>

<!-- PAN -->

<div class="card">

<div class="card-top">

<div class="icon">
<i class="fa-solid fa-address-card"></i>
</div>

<div class="text">

<h3>
Upload PAN Card
</h3>

<p>
Clear PAN image required
</p>

</div>

</div>

<label class="upload">

Choose PAN Card

<input type="file"
id="panFile">

</label>

</div>

<!-- SELFIE -->

<div class="card">

<div class="card-top">

<div class="icon">
<i class="fa-solid fa-camera"></i>
</div>

<div class="text">

<h3>
Upload Selfie
</h3>

<p>
Take a clear live photo
</p>

</div>

</div>

<label class="upload">

Choose Selfie

<input type="file"
id="selfieFile">

</label>

</div>

<!-- BUTTON -->

<button class="verify"
onclick="verifyKYC()">

Verify KYC

</button>

</div>

<!-- BOTTOM -->

<div class="bottom">

<a href="home.html"
class="nav">

<i class="fa-solid fa-house"></i>
Home

</a>

<a href="reward.html"
class="nav">

<i class="fa-solid fa-gift"></i>
Reward

</a>

<a href="qrpay.html"
class="qr">

<i class="fa-solid fa-qrcode"></i>

</a>

<a href="scratch.html"
class="nav">

<i class="fa-solid fa-ticket"></i>
Scratch

</a>

<a href="profile.html"
class="nav active">

<i class="fa-solid fa-user"></i>
Profile

</a>

</div>

<script>

/* CURRENT USER */

let currentUser =
JSON.parse(
localStorage.getItem(
"currentUser"
)
) || {};

/* USER KEY */

let userKey =
currentUser.userId || "guest";

/* ALL USERS */

let allUsers =
JSON.parse(
localStorage.getItem(
"allUsers"
)
) || [];

/* AUTO STATUS */

if(
currentUser.kyc == "Verified"
){

document.getElementById(
"kycBadge"
).innerHTML =
"Verified";

document.getElementById(
"kycBadge"
).style.background =
"#14532d";

document.getElementById(
"kycBadge"
).style.color =
"#4ade80";

}

/* VERIFY KYC */

function verifyKYC(){

let aadhaar =
document.getElementById(
"aadhaarFile"
).files.length;

let pan =
document.getElementById(
"panFile"
).files.length;

let selfie =
document.getElementById(
"selfieFile"
).files.length;

/* CHECK */

if(
aadhaar == 0 ||
pan == 0 ||
selfie == 0
){

alert(
"Please Upload All Documents"
);

return;

}

/* SAVE KYC */

currentUser.kyc =
"Verified";

/* UPDATE CURRENT USER */

localStorage.setItem(
"currentUser",
JSON.stringify(currentUser)
);

/* UPDATE USERS */

allUsers = allUsers.map(user=>{

if(
user.userId ==
currentUser.userId
){

user.kyc =
"Verified";

}

return user;

});

localStorage.setItem(
"allUsers",
JSON.stringify(allUsers)
);

/* SCRATCH ENABLE */

localStorage.setItem(
"kycScratch_" + userKey,
"true"
);

/* STATUS */

document.getElementById(
"kycBadge"
).innerHTML =
"Verified";

document.getElementById(
"kycBadge"
).style.background =
"#14532d";

document.getElementById(
"kycBadge"
).style.color =
"#4ade80";

/* SUCCESS */

alert(
"KYC Verified Successfully"
);

}

</script>

</body>

</html>
