<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>
Forgot Password
</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
-webkit-tap-highlight-color:transparent;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#020617;
}

body{
display:flex;
justify-content:center;
align-items:center;
position:relative;
padding:18px;
}

/* BACKGROUND */

.bg1{
position:absolute;
width:220px;
height:220px;
background:#9333ea;
border-radius:50%;
filter:blur(110px);
top:-120px;
left:-120px;
opacity:.38;
}

.bg2{
position:absolute;
width:220px;
height:220px;
background:#06b6d4;
border-radius:50%;
filter:blur(110px);
bottom:-120px;
right:-120px;
opacity:.28;
}

/* CARD */

.forgot-card{

position:relative;

width:100%;
max-width:315px;

padding:
20px
18px
24px;

border-radius:30px;

background:
linear-gradient(
180deg,
rgba(17,24,39,.96),
rgba(2,6,23,.95)
);

border:
1px solid rgba(255,255,255,.05);

box-shadow:
0 0 30px rgba(0,0,0,.5);

overflow:hidden;
z-index:2;
}

/* LOGO */

.logo-box{
text-align:center;
margin-top:2px;
}

.logo-image{

width:160px;

display:block;

margin:auto;

object-fit:contain;

mix-blend-mode:screen;

filter:
drop-shadow(0 0 14px rgba(59,130,246,.28));
}

/* TITLE */

.title{

margin-top:14px;

text-align:center;
}

.title h1{

font-size:24px;

font-weight:800;

color:white;
}

.title p{

margin-top:6px;

font-size:11px;

line-height:1.5;

color:#94a3b8;
}

/* INPUT */

.input-box{

margin-top:16px;

position:relative;
}

.input-box input{

width:100%;

height:46px;

border:none;
outline:none;

padding:0 15px;

border-radius:15px;

background:
rgba(255,255,255,.04);

border:
1px solid rgba(255,255,255,.05);

font-size:13px;

color:white;
}

.input-box input:focus{

border-color:#38bdf8;
}

.input-box label{

position:absolute;

left:15px;
top:13px;

font-size:12px;

color:#94a3b8;

pointer-events:none;

transition:.25s;
}

.input-box input:focus~label,
.input-box input:valid~label{

top:-6px;
left:11px;

font-size:8px;

padding:2px 5px;

background:#020617;

border-radius:20px;

color:#38bdf8;
}

/* BUTTON */

.reset-btn{

width:100%;

height:46px;

margin-top:18px;

border:none;
outline:none;

border-radius:15px;

font-size:15px;
font-weight:700;

color:white;

background:
linear-gradient(
90deg,
#9333ea,
#3b82f6,
#22d3ee
);

box-shadow:
0 0 18px rgba(59,130,246,.25);

cursor:pointer;
}

/* BACK */

.back-login{

margin-top:14px;

text-align:center;

font-size:10px;

color:#94a3b8;
}

.back-login a{

text-decoration:none;

color:#22d3ee;

font-weight:600;
}

</style>

</head>

<body>

<div class="bg1"></div>
<div class="bg2"></div>

<div class="forgot-card">

<!-- LOGO -->

<div class="logo-box">

<img src="image.png" class="logo-image">

</div>

<!-- TITLE -->

<div class="title">

<h1>
Forgot Password
</h1>

<p>
Enter your mobile number or email address to reset your password
</p>

</div>

<!-- FORM -->

<form>

<div class="input-box">

<input type="text"
required>

<label>
Mobile Number / Email
</label>

</div>

<button class="reset-btn"
type="submit">

Send Reset Link

</button>

<div class="back-login">

Remember Password?

<a href="login.html">
Login
</a>

</div>

</form>

</div>

</body>

</html>
